name: schema-ru

on:
  push:
    branches:
      - ru
    paths:
      - "structs/content.go"
  workflow_dispatch:

jobs:
  schema-ru:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger schema update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PKG_TOKEN }}
          repository: alsosee/search
          event-type: schema-ru
