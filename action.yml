name: Build static site
description: ""

author: Konstantin Chukhlomin <mail@chuhlomin.com>

branding:
  icon: file-text
  color: purple

inputs:
  info:
    description: Directory that contains info files
    required: true
  media:
    description: Directory that contains media files
    required: true
  output:
    description: Directory to output static site
    required: true
  media_host:
    description: Host of media files
    required: false
  opengraph_host:
    description: Host of generated OpenGraph images
    required: false
  opengraph_r2_account_id:
    description: Cloudflare account ID for generated OpenGraph image uploads
    required: false
  opengraph_r2_access_key_id:
    description: Cloudflare R2 access key ID for generated OpenGraph image uploads
    required: false
  opengraph_r2_access_key_secret:
    description: Cloudflare R2 access key secret for generated OpenGraph image uploads
    required: false
  opengraph_r2_bucket:
    description: Cloudflare R2 bucket for generated OpenGraph image uploads
    required: false
  outputs:
    description: Comma-separated projectors to run
    required: false
  search_host:
    description: Host of MeiliSearch
    required: false
  search_index:
    description: Name of MeiliSearch index
    required: false
  search_api_key:
    description: Public API key of MeiliSearch
    required: false
  search_master_key:
    description: Master API key of MeiliSearch
    required: false
  search_state:
    description: File to store search state
    required: false
  opengraph_state:
    description: File to store OpenGraph image state
    required: false
  force:
    description: Force selected projectors for a path, comma-separated paths, JSON list, or all
    required: false
  num_workers:
    description: Number of workers to use
    required: false
    default: "4"
  ignorefile:
    description: File used to list files to ignore
    required: false

runs:
  using: docker
  image: docker://ghcr.io/alsosee/finder:latest
